services:
    nginx:
        image: ${DOCKER_REGISTRY-}nginx-proxy
        build:
            context: ./nginx
            dockerfile: Dockerfile
        container_name: nginx-proxy
        ports:
            - "${FRONTEND_PORT:-3000}:443"
            # Configure WEBDAV_HTTPS_PORT / WEBDAV_HTTP_PORT in .env to change these external ports.
            - "${WEBDAV_HTTPS_PORT:-443}:443"
            - "${WEBDAV_HTTP_PORT:-80}:80"
        volumes:
            - ./data/certs:/etc/nginx/certs
        depends_on:
            - frontend
            - webapi
        networks:
            - modelibr
        restart: unless-stopped
    webapi:
        image: ${DOCKER_REGISTRY-}webapi
        build:
            context: .
            dockerfile: src/WebApi/Dockerfile
            args:
                APP_UID: ${HOST_UID:-1000}
                APP_GID: ${HOST_GID:-1000}
        container_name: webapi
        environment:
            - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
            - ENABLE_BLENDER=${ENABLE_BLENDER:-false}
            - WORKER_API_KEY=${WORKER_API_KEY:-}
            - UPLOAD_STORAGE_PATH=/var/lib/modelibr/uploads
            - ConnectionStrings__Default=Host=postgres;Port=5432;Database=Modelibr;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};
            - DisableHttpsRedirection=true
            - HTTPS_PORT=${HTTPS_PORT:-8443}
            - EXPOSE_443_PORT=${EXPOSE_443_PORT:-true}
            - WEBDAV_HTTPS_PORT=${WEBDAV_HTTPS_PORT:-443}
            - WEBDAV_HTTP_PORT=${WEBDAV_HTTP_PORT:-80}
            # reduce verbosity: only warnings and above
            - ASPNETCORE_LOGGING__LOGLEVEL__DEFAULT=Warning
            - ASPNETCORE_LOGGING__LOGLEVEL__Microsoft=Warning
            - BLENDER_INSTALL_PATH=${BLENDER_INSTALL_PATH:-/var/lib/modelibr/blender}
        ports:
            - "${HTTPS_PORT:-8443}:${HTTPS_PORT:-8443}"
        volumes:
            # Use platform-appropriate secret/cert paths; on macOS $HOME works (APPDATA is Windows-specific)
            - ${HOME}/.microsoft/usersecrets:/home/app/.microsoft/usersecrets:ro
            - ${HOME}/.aspnet/https:/home/app/.aspnet/https:ro
            - ./data/uploads:/var/lib/modelibr/uploads
            - blender-data:/var/lib/modelibr/blender
        depends_on:
            postgres:
                condition: service_healthy
        networks:
            - modelibr
    frontend:
        image: ${DOCKER_REGISTRY-}frontend
        build:
            context: ./src/frontend
            dockerfile: Dockerfile
            target: production
            args:
                VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        container_name: frontend
        networks:
            - modelibr
    asset-processor:
        image: ${DOCKER_REGISTRY-}asset-processor
        build:
            context: ./src/asset-processor
            dockerfile: Dockerfile
            args:
                ENABLE_BLENDER: ${ENABLE_BLENDER:-false}
                BLENDER_VERSION: ${BLENDER_VERSION:-5.0.1}
        container_name: asset-processor
        environment:
            - WORKER_ID=${WORKER_ID:-worker-1}
            - WORKER_PORT=${WORKER_PORT:-3001}
            - API_BASE_URL=https://webapi:${HTTPS_PORT:-8443}
            - WORKER_API_KEY=${WORKER_API_KEY:-}
            - MAX_CONCURRENT_JOBS=${MAX_CONCURRENT_JOBS:-3}
            - RENDER_WIDTH=${RENDER_WIDTH:-256}
            - RENDER_HEIGHT=${RENDER_HEIGHT:-256}
            - RENDER_FORMAT=${RENDER_FORMAT:-png}
            - LOG_LEVEL=${LOG_LEVEL:-info}
            - NODE_TLS_REJECT_UNAUTHORIZED=0 # Required for self-signed cert; do NOT use in production with external TLS
            - THUMBNAIL_STORAGE_PATH=/var/lib/modelibr/thumbnails
            - BLENDER_PATH=${BLENDER_PATH:-/opt/blender/blender}
        ports:
            - "${WORKER_PORT:-3001}:3001"
        volumes:
            - ./data/thumbnails:/var/lib/modelibr/thumbnails
            - blender-data:/var/lib/modelibr/blender
        depends_on:
            - webapi
        networks:
            - modelibr
        restart: unless-stopped
        deploy:
            resources:
                limits:
                    memory: 4G
    postgres:
        image: postgres:16-alpine
        container_name: postgres
        environment:
            POSTGRES_DB: Modelibr
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        ports:
            - "${POSTGRES_PORT}:5432"
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d Modelibr"]
            interval: 15s
            timeout: 5s
            retries: 10
            start_period: 20s
        volumes:
            - ./data/postgres:/var/lib/postgresql/data
        networks:
            - modelibr

networks:
    modelibr:
        driver: bridge

volumes:
    # Shared volume for dynamically downloaded Blender binaries.
    # Mounted in both webapi (writes) and asset-processor (reads/executes).
    blender-data:
