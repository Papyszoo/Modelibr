name: Nightly Slow E2E Tests

on:
    schedule:
        # Run at 3:00 AM UTC every day
        - cron: "0 3 * * *"
    workflow_dispatch:
        inputs:
            branch:
                description: "Branch to test"
                required: false
                default: "main"

concurrency:
    group: nightly-e2e-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    slow-e2e-tests:
        name: Slow E2E Tests (Nightly)
        runs-on: ubuntu-latest
        timeout-minutes: 60

        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  ref: ${{ github.event.inputs.branch || github.ref }}

            - name: Build and start services
              run: docker compose -f tests/e2e/docker-compose.e2e.yml up -d --build

            - name: Wait for services to be ready
              run: |
                  echo "Waiting for services to be healthy..."
                  timeout 120 bash -c 'until curl -sf http://localhost:8090/health; do echo "Waiting for backend..."; sleep 5; done'
                  echo "Backend is ready!"
                  timeout 60 bash -c 'until curl -sf http://localhost:3002; do echo "Waiting for frontend..."; sleep 5; done'
                  echo "Frontend is ready!"
                  timeout 60 bash -c 'until curl -sf http://localhost:3003/health; do echo "Waiting for thumbnail worker..."; sleep 5; done'
                  echo "Thumbnail worker is ready!"

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"
                  cache-dependency-path: tests/e2e/package-lock.json

            - name: Install dependencies
              working-directory: tests/e2e
              run: npm ci

            - name: Install Playwright browsers
              working-directory: tests/e2e
              run: npx playwright install --with-deps chromium

            - name: Generate BDD test files
              working-directory: tests/e2e
              run: npx bddgen

            - name: Run setup tests
              working-directory: tests/e2e
              run: npx playwright test --project=setup
              env:
                  FRONTEND_URL: http://localhost:3002
                  PW_WORKERS: "1"
                  PW_PHASE: setup

            - name: Run slow E2E tests
              id: slow-tests
              continue-on-error: true
              working-directory: tests/e2e
              run: npx playwright test --project=slow --no-deps
              env:
                  FRONTEND_URL: http://localhost:3002
                  PW_WORKERS: "1"

            - name: Upload Playwright report
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: nightly-playwright-report-${{ github.run_number }}
                  path: tests/e2e/playwright-report/
                  retention-days: 14
                  if-no-files-found: ignore

            - name: Upload test results
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: nightly-test-results-${{ github.run_number }}
                  path: tests/e2e/test-results/
                  retention-days: 14
                  if-no-files-found: ignore

            - name: Stop services
              if: always()
              run: |
                  docker compose -f tests/e2e/docker-compose.e2e.yml logs webapi-e2e 2>&1 | tail -50 || true
                  docker compose -f tests/e2e/docker-compose.e2e.yml down -v

            - name: Fail if tests failed
              if: steps.slow-tests.outcome == 'failure'
              run: exit 1
