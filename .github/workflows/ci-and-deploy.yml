name: CI and Deploy Docs

on:
    push:
        branches: ["**"]
    pull_request:
        branches: ["**"]
    workflow_dispatch:

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read
    pages: write
    id-token: write
    actions: read

jobs:
    detect-changes:
        name: Detect Changes
        runs-on: ubuntu-latest
        outputs:
            e2e-relevant: ${{ steps.filter.outputs.e2e-relevant }}
            backend: ${{ steps.filter.outputs.backend }}
            frontend: ${{ steps.filter.outputs.frontend }}
            worker: ${{ steps.filter.outputs.worker }}
        steps:
            - uses: actions/checkout@v4
            - uses: dorny/paths-filter@v3
              id: filter
              with:
                  filters: |
                      e2e-relevant:
                        - 'src/**'
                        - 'tests/e2e/**'
                        - 'docker-compose.yml'
                        - 'tests/e2e/docker-compose.e2e.yml'
                        - '.github/workflows/ci-and-deploy.yml'
                        - 'nginx/**'
                      backend:
                        - 'src/WebApi/**'
                        - 'src/Application/**'
                        - 'src/Domain/**'
                        - 'src/Infrastructure/**'
                        - 'src/SharedKernel/**'
                      frontend:
                        - 'src/frontend/**'
                      worker:
                        - 'src/asset-processor/**'

    backend-tests:
        name: Backend Unit Tests
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup .NET 9
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: "9.0.x"

            - name: Restore dependencies
              run: dotnet restore Modelibr.sln

            - name: Build
              run: dotnet build Modelibr.sln --no-restore

            - name: Run tests
              run: dotnet test Modelibr.sln --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx" --filter "Category!=Integration"

            - name: Parse test results
              if: always()
              run: |
                  # Find and parse TRX files from all test projects
                  total=0
                  passed=0
                  failed=0
                  failures="[]"

                  # Find all TRX files in TestResults directories (recursively under tests/)
                  trx_files=$(find tests -type d -name "TestResults" -exec find {} -type f -name "test-results.trx" \; 2>/dev/null || true)

                  if [ -n "$trx_files" ]; then
                    echo "Found TRX files:"
                    echo "$trx_files"

                    # Sum up test results from all TRX files
                    while IFS= read -r trx_file; do
                      if [ -f "$trx_file" ]; then
                        file_total=$(grep -o 'total="[0-9]*"' "$trx_file" | grep -o '[0-9]*' || echo "0")
                        file_passed=$(grep -o 'passed="[0-9]*"' "$trx_file" | grep -o '[0-9]*' || echo "0")
                        file_failed=$(grep -o 'failed="[0-9]*"' "$trx_file" | grep -o '[0-9]*' || echo "0")

                        total=$((total + file_total))
                        passed=$((passed + file_passed))
                        failed=$((failed + file_failed))
                        
                        # Extract failed test names and messages from TRX
                        if [ "$file_failed" -gt 0 ]; then
                          # Parse failed tests - TRX format has UnitTestResult with outcome="Failed"
                          failed_tests=$(grep -oP 'testName="[^"]+"[^>]*outcome="Failed"' "$trx_file" | grep -oP 'testName="\K[^"]+' || true)
                          if [ -n "$failed_tests" ]; then
                            while IFS= read -r test_name; do
                              # Try to get error message (simplified - may not get full message)
                              error_msg=$(grep -A5 "testName=\"$test_name\"" "$trx_file" | grep -oP '<Message>\K[^<]+' | head -1 || echo "Test failed")
                              error_msg=$(echo "$error_msg" | sed 's/"/\\"/g' | tr '\n' ' ' | cut -c1-200)
                              failures=$(echo "$failures" | jq --arg name "$test_name" --arg msg "$error_msg" '. + [{"name": $name, "message": $msg}]')
                            done <<< "$failed_tests"
                          fi
                        fi
                      fi
                    done <<< "$trx_files"

                    # Create JSON summary
                    mkdir -p test-results
                    echo "{\"total\": ${total}, \"passed\": ${passed}, \"failed\": ${failed}, \"framework\": \".NET 9.0\", \"failures\": ${failures}}" > test-results/backend-results.json
                    echo "Backend tests: ${passed}/${total} passed, ${failed} failed"
                  else
                    echo "No test results found"
                    mkdir -p test-results
                    echo '{"total": 0, "passed": 0, "failed": 0, "framework": ".NET 9.0", "failures": [], "error": "No results"}' > test-results/backend-results.json
                  fi

            - name: Upload backend test results
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: backend-test-results-${{ github.run_number }}
                  path: test-results/backend-results.json
                  retention-days: 30

    frontend-tests:
        name: Frontend Unit Tests
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: src/frontend

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"
                  cache-dependency-path: src/frontend/package-lock.json

            - name: Install dependencies
              run: npm ci

            - name: Run tests
              id: frontend-test
              continue-on-error: true
              run: npm test 2>&1 | tee test-output.txt

            - name: Parse test results
              if: always()
              working-directory: src/frontend
              run: |
                  # Parse Jest output from console
                  if [ -f "test-output.txt" ]; then
                    # Extract test counts from Jest summary output using grep -oP
                    # Jest outputs something like "Tests:       5 passed, 5 total"
                    # Note: Using grep -oP with look-ahead instead of sed to avoid greedy matching issues
                    total=$(grep -oP '\d+(?= total)' test-output.txt | tail -1 || echo "0")
                    passed=$(grep -oP '\d+(?= passed)' test-output.txt | tail -1 || echo "0")
                    failed=$(grep -oP '\d+(?= failed)' test-output.txt | tail -1 || echo "0")

                    # Set defaults if empty
                    total=${total:-0}
                    passed=${passed:-0}
                    failed=${failed:-0}

                    # If total is 0 but we have passed tests, total = passed + failed
                    if [ "$total" = "0" ] && [ "$passed" != "0" ]; then
                      total=$((passed + failed))
                    fi

                    # Extract failing test names and messages from Jest output
                    # Jest format: "● TestSuiteName › test name" followed by error
                    failures="[]"
                    if [ "$failed" -gt 0 ]; then
                      # Extract failed test blocks (lines starting with ●)
                      grep -n "^[[:space:]]*●" test-output.txt | while IFS=: read -r line_num line_content; do
                        test_name=$(echo "$line_content" | sed 's/^[[:space:]]*● //' | cut -c1-150)
                        # Get error message from next few lines
                        error_msg=$(sed -n "$((line_num+1)),$((line_num+5))p" test-output.txt | tr '\n' ' ' | sed 's/"/\\"/g' | cut -c1-200)
                        failures=$(echo "$failures" | jq --arg name "$test_name" --arg msg "$error_msg" '. + [{"name": $name, "message": $msg}]')
                      done 2>/dev/null || true
                    fi
                    
                    # Handle case where jq parsing failed
                    if ! echo "$failures" | jq . >/dev/null 2>&1; then
                      failures="[]"
                    fi

                    # Create summary JSON
                    mkdir -p "$GITHUB_WORKSPACE/test-results"
                    echo "{\"total\": ${total}, \"passed\": ${passed}, \"failed\": ${failed}, \"framework\": \"Jest\", \"failures\": ${failures}}" > "$GITHUB_WORKSPACE/test-results/frontend-results.json"
                    echo "Frontend tests: ${passed}/${total} passed, ${failed} failed"
                  else
                    echo "No test output found"
                    mkdir -p "$GITHUB_WORKSPACE/test-results"
                    echo '{"total": 0, "passed": 0, "failed": 0, "framework": "Jest", "failures": [], "error": "No results"}' > "$GITHUB_WORKSPACE/test-results/frontend-results.json"
                  fi

            - name: Upload frontend test results
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: frontend-test-results-${{ github.run_number }}
                  path: test-results/frontend-results.json
                  retention-days: 30

    asset-processor-tests:
        name: Asset Processor Tests
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: src/asset-processor

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"
                  cache-dependency-path: src/asset-processor/package-lock.json

            - name: Install dependencies
              run: npm ci

            - name: Run tests
              id: asset-processor-test
              continue-on-error: true
              run: npm test 2>&1 | tee test-output.txt

            - name: Parse test results
              if: always()
              working-directory: src/asset-processor
              run: |
                  if [ -f "test-output.txt" ]; then
                    # Parse vitest output
                    # Vitest outputs: "Tests  33 passed (33)" or "Tests  2 failed | 31 passed (33)"
                    total=$(grep -oP '\(\K\d+(?=\))' test-output.txt | tail -1 || echo "0")
                    passed=$(grep -oP '\d+(?= passed)' test-output.txt | tail -1 || echo "0")
                    failed=$(grep -oP '\d+(?= failed)' test-output.txt | tail -1 || echo "0")

                    total=${total:-0}
                    passed=${passed:-0}
                    failed=${failed:-0}

                    if [ "$total" = "0" ] && [ "$passed" != "0" ]; then
                      total=$((passed + failed))
                    fi

                    # Extract failing test names from vitest output
                    failures="[]"
                    if [ "$failed" -gt 0 ]; then
                      grep "^[[:space:]]*×\|FAIL" test-output.txt | while IFS= read -r line; do
                        test_name=$(echo "$line" | sed 's/^[[:space:]]*//' | cut -c1-150)
                        failures=$(echo "$failures" | jq --arg name "$test_name" --arg msg "Test failed" '. + [{"name": $name, "message": $msg}]')
                      done 2>/dev/null || true
                    fi

                    if ! echo "$failures" | jq . >/dev/null 2>&1; then
                      failures="[]"
                    fi

                    mkdir -p "$GITHUB_WORKSPACE/test-results"
                    echo "{\"total\": ${total}, \"passed\": ${passed}, \"failed\": ${failed}, \"framework\": \"Vitest\", \"failures\": ${failures}}" > "$GITHUB_WORKSPACE/test-results/asset-processor-results.json"
                    echo "Asset processor tests: ${passed}/${total} passed, ${failed} failed"
                  else
                    echo "No test output found"
                    mkdir -p "$GITHUB_WORKSPACE/test-results"
                    echo '{"total": 0, "passed": 0, "failed": 0, "framework": "Vitest", "failures": [], "error": "No results"}' > "$GITHUB_WORKSPACE/test-results/asset-processor-results.json"
                  fi

            - name: Upload asset processor test results
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: asset-processor-test-results-${{ github.run_number }}
                  path: test-results/asset-processor-results.json
                  retention-days: 30

    build-storybook:
        name: Build Storybook
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: src/frontend

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"
                  cache-dependency-path: src/frontend/package-lock.json

            - name: Install dependencies
              run: npm ci

            - name: Build Storybook
              run: npx storybook build

            - name: Upload Storybook artifact
              uses: actions/upload-artifact@v4
              with:
                  name: storybook-static-${{ github.run_number }}
                  path: src/frontend/storybook-static/
                  retention-days: 30

    e2e-tests:
        name: E2E Tests
        runs-on: ubuntu-latest
        needs: [detect-changes]
        if: needs.detect-changes.outputs.e2e-relevant == 'true' || github.event_name == 'workflow_dispatch'

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Build and start services
              run: |
                  docker compose -f tests/e2e/docker-compose.e2e.yml up -d --build

            - name: Show container status
              if: always()
              run: |
                  echo "=== Container status ==="
                  docker compose -f tests/e2e/docker-compose.e2e.yml ps -a
                  echo ""
                  echo "=== webapi-e2e logs ==="
                  docker compose -f tests/e2e/docker-compose.e2e.yml logs webapi-e2e 2>&1 | tail -100 || true
                  echo ""
                  echo "=== postgres-e2e logs ==="
                  docker compose -f tests/e2e/docker-compose.e2e.yml logs postgres-e2e 2>&1 | tail -50 || true

            - name: Wait for services to be ready
              run: |
                  echo "Waiting for services to be healthy..."
                  timeout 120 bash -c 'until curl -sf http://localhost:8090/health; do echo "Waiting for backend..."; sleep 5; done'
                  echo "Backend is ready!"
                  timeout 60 bash -c 'until curl -sf http://localhost:3002; do echo "Waiting for frontend..."; sleep 5; done'
                  echo "Frontend is ready!"
                  timeout 60 bash -c 'until curl -sf http://localhost:3003/health; do echo "Waiting for thumbnail worker..."; sleep 5; done'
                  echo "Thumbnail worker is ready!"

            - name: Setup Node.js for E2E
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"
                  cache-dependency-path: tests/e2e/package-lock.json

            - name: Install E2E dependencies
              working-directory: tests/e2e
              run: npm ci

            - name: Install Playwright browsers
              working-directory: tests/e2e
              run: npx playwright install --with-deps chromium

            - name: Run E2E tests
              id: e2e
              continue-on-error: true
              working-directory: tests/e2e
              run: npm run test:ci
              env:
                  FRONTEND_URL: http://localhost:3002
                  PW_WORKERS: "3"

            - name: Upload Playwright report
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: playwright-report-${{ github.run_number }}
                  path: tests/e2e/playwright-report/
                  retention-days: 30
                  if-no-files-found: ignore

            - name: Upload test results
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: test-results-${{ github.run_number }}
                  path: tests/e2e/test-results/
                  retention-days: 30
                  if-no-files-found: ignore

            - name: Stop services
              if: always()
              run: |
                  echo "=== Final container status ==="
                  docker compose -f tests/e2e/docker-compose.e2e.yml ps -a || true
                  echo ""
                  echo "=== webapi-e2e logs (full) ==="
                  docker compose -f tests/e2e/docker-compose.e2e.yml logs webapi-e2e 2>&1 || true
                  echo ""
                  echo "=== frontend-e2e logs ==="
                  docker compose -f tests/e2e/docker-compose.e2e.yml logs frontend-e2e 2>&1 | tail -50 || true
                  echo ""
                  docker compose -f tests/e2e/docker-compose.e2e.yml down -v

            - name: Fail if E2E tests failed
              if: steps.e2e.outcome == 'failure'
              run: exit 1

    ci-status:
        name: CI Status
        runs-on: ubuntu-latest
        needs:
            [
                backend-tests,
                frontend-tests,
                asset-processor-tests,
                e2e-tests,
            ]
        if: always()

        steps:
            - name: Check all jobs succeeded
              if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
              run: |
                  echo "CI checks failed!"
                  exit 1

            - name: All checks passed
              run: |
                  echo "All CI checks passed!"

    generate-videos:
        name: Generate Feature Videos
        runs-on: ubuntu-latest
        needs: [detect-changes]
        # Historically this job completes in ~12 minutes. A hard ceiling prevents
        # a single hung step (e.g. apt mirror flake during `playwright install
        # --with-deps`) from silently consuming the 6h runner default.
        timeout-minutes: 45

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Build and start E2E services
              timeout-minutes: 15
              run: |
                  docker compose -f tests/e2e/docker-compose.e2e.yml up -d --build

            - name: Wait for services to be ready
              timeout-minutes: 5
              run: |
                  echo "Waiting for services to be healthy..."
                  timeout 120 bash -c 'until curl -sf http://localhost:8090/health; do sleep 5; done'
                  echo "Backend is ready!"
                  timeout 60 bash -c 'until curl -sf http://localhost:3002; do sleep 5; done'
                  echo "Frontend is ready!"
                  timeout 60 bash -c 'until curl -sf http://localhost:3003/health; do sleep 5; done'
                  echo "Thumbnail worker is ready!"

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"

            - name: Install video dependencies
              working-directory: docs/videos
              timeout-minutes: 5
              run: npm ci

            - name: Install Playwright browsers
              working-directory: docs/videos
              timeout-minutes: 10
              # Drop --with-deps: ubuntu-latest already ships the libs Chromium
              # needs, and the apt path periodically stalls on Azure mirrors
              # (Ign: responses that retry for 10+ minutes). The browser binary
              # itself comes from Playwright's CDN and is unaffected.
              run: npx playwright install chromium

            - name: Generate videos
              id: generate
              working-directory: docs/videos
              timeout-minutes: 25
              run: npm run generate
              env:
                  FRONTEND_URL: http://localhost:3002
                  API_BASE_URL: http://localhost:8090

            - name: Upload feature videos
              uses: actions/upload-artifact@v4
              with:
                  name: feature-videos-${{ github.run_number }}
                  path: docs/static/videos/
                  retention-days: 30
                  if-no-files-found: error

            - name: Stop services
              if: always()
              run: |
                  docker compose -f tests/e2e/docker-compose.e2e.yml down -v

    build-docs:
        name: Build Documentation with Reports
        runs-on: ubuntu-latest
        needs:
            [
                detect-changes,
                backend-tests,
                frontend-tests,
                asset-processor-tests,
                build-storybook,
                generate-videos,
            ]
        # Always run to generate reports, even if tests fail
        if: always()

        steps:
            - name: Checkout current branch for scripts
              uses: actions/checkout@v4
              with:
                  path: current-branch

            - name: Checkout main branch for docs
              uses: actions/checkout@v4
              with:
                  ref: main
                  path: main-branch

            - name: Copy scripts from current branch
              run: |
                  mkdir -p .github/scripts
                  cp -r current-branch/.github/scripts/* .github/scripts/ || true

            - name: Copy docs from main branch
              run: |
                  cp -r main-branch/docs ./docs

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
                  cache-dependency-path: docs/package-lock.json

            - name: Download current run artifacts
              uses: actions/download-artifact@v4.1.3
              continue-on-error: true
              with:
                  path: current-run-artifacts

            - name: Prepare current run artifacts for inclusion
              run: |
                  mkdir -p docs/static/test-reports/run-${{ github.run_number }}

                  # Copy playwright report if available
                  if [ -d "current-run-artifacts/playwright-report-${{ github.run_number }}" ]; then
                    echo "Found current run Playwright report"
                    # Check if directory has contents before copying
                    if [ -n "$(find "current-run-artifacts/playwright-report-${{ github.run_number }}" -maxdepth 1 -mindepth 1 2>/dev/null)" ]; then
                      cp -r "current-run-artifacts/playwright-report-${{ github.run_number }}/." "docs/static/test-reports/run-${{ github.run_number }}/"
                    else
                      echo "Playwright report directory is empty"
                    fi
                  fi

                  # Copy backend test results if available
                  if [ -f "current-run-artifacts/backend-test-results-${{ github.run_number }}/backend-results.json" ]; then
                    echo "Found current run backend test results"
                    cp "current-run-artifacts/backend-test-results-${{ github.run_number }}/backend-results.json" "docs/static/test-reports/run-${{ github.run_number }}/"
                  fi

                  # Copy frontend test results if available
                  if [ -f "current-run-artifacts/frontend-test-results-${{ github.run_number }}/frontend-results.json" ]; then
                    echo "Found current run frontend test results"
                    cp "current-run-artifacts/frontend-test-results-${{ github.run_number }}/frontend-results.json" "docs/static/test-reports/run-${{ github.run_number }}/"
                  fi

                  # Copy asset processor test results if available
                  if [ -f "current-run-artifacts/asset-processor-test-results-${{ github.run_number }}/asset-processor-results.json" ]; then
                    echo "Found current run asset processor test results"
                    cp "current-run-artifacts/asset-processor-test-results-${{ github.run_number }}/asset-processor-results.json" "docs/static/test-reports/run-${{ github.run_number }}/"
                  fi

                  # Create metadata files for the current run
                  # Use current time if head_commit timestamp is not available
                  TIMESTAMP="${{ github.event.head_commit.timestamp }}"
                  if [ -z "$TIMESTAMP" ]; then
                    TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
                  fi
                  echo "$TIMESTAMP" > docs/static/test-reports/run-${{ github.run_number }}/timestamp.txt
                  # Set conclusion based on test results
                  # Mark as failure if any test job failed, otherwise success
                  # (cancelled/skipped jobs are treated as not-failed)
                  TEST_CONCLUSION="success"
                  if [ "${{ needs.backend-tests.result }}" = "failure" ] || \
                     [ "${{ needs.frontend-tests.result }}" = "failure" ] || \
                     [ "${{ needs.asset-processor-tests.result }}" = "failure" ] || \
                     [ "${{ needs.e2e-tests.result }}" = "failure" ]; then
                    TEST_CONCLUSION="failure"
                  fi
                  echo "$TEST_CONCLUSION" > docs/static/test-reports/run-${{ github.run_number }}/conclusion.txt
                  echo "${{ github.run_number }}" > docs/static/test-reports/run-${{ github.run_number }}/run-number.txt
                  echo "${{ github.ref_name }}" > docs/static/test-reports/run-${{ github.run_number }}/branch.txt
                  echo "${{ github.run_id }}" > docs/static/test-reports/run-${{ github.run_number }}/run-id.txt

            - name: Fetch last 9 historical test reports from all branches
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
                  CURRENT_RUN_NUMBER: ${{ github.run_number }}
              run: |
                  chmod +x .github/scripts/fetch-test-reports.sh
                  .github/scripts/fetch-test-reports.sh

            - name: Fail if feature video generation did not succeed
              if: needs.generate-videos.result != 'success'
              run: |
                  echo "Feature video generation must succeed before building documentation."
                  exit 1

            - name: Download feature videos
              uses: actions/download-artifact@v4.1.3
              with:
                  name: feature-videos-${{ github.run_number }}
                  path: docs/static/videos/

            - name: Verify feature videos
              run: |
                  expected_videos=(
                    model-management.webm
                    texture-sets.webm
                    recycled-files.webm
                    user-interface.webm
                    sprites.webm
                    sounds.webm
                    projects.webm
                    packs.webm
                  )

                  for video in "${expected_videos[@]}"; do
                    if [ ! -f "docs/static/videos/$video" ]; then
                      echo "Missing required documentation video: $video"
                      exit 1
                    fi
                  done

            - name: Download Storybook build
              uses: actions/download-artifact@v4.1.3
              continue-on-error: true
              with:
                  name: storybook-static-${{ github.run_number }}
                  path: docs/static/storybook/

            - name: Install dependencies
              working-directory: docs
              run: npm ci

            - name: Build website
              working-directory: docs
              run: npm run build

            - name: Build demo app
              working-directory: current-branch/src/frontend
              run: npm ci && npm run build:demo

            - name: Copy demo build into docs site
              run: |
                  mkdir -p docs/build/demo
                  cp -r current-branch/src/frontend/dist/* docs/build/demo/

            - name: Upload docs with reports (for preview)
              uses: actions/upload-artifact@v4
              with:
                  name: docs-with-reports
                  path: docs/build/
                  retention-days: 30

            - name: Upload artifact for GitHub Pages
              uses: actions/upload-pages-artifact@v3
              with:
                  path: docs/build

    deploy-docs:
        name: Deploy to GitHub Pages
        runs-on: ubuntu-latest
        needs: [build-docs]
        # Always deploy after docs are built - environment protection must be configured in repo settings
        if: always() && needs.build-docs.result == 'success'

        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
