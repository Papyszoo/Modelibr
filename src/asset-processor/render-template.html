<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Model Renderer</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background-color: transparent;
      }

      #canvas-container {
        width: 100vw;
        height: 100vh;
      }

      canvas {
        display: block;
      }
    </style>
  </head>

  <body>
    <div id="canvas-container"></div>
    <!-- TIFF decoding stack:
         - pako: dependency of utif2 (deflate/inflate), exposes window.pako
         - utif2: TIFF parser, exposes window.UTIF
         - lib/tiffDecode.js: shared decoder (ESM, with a window.modelibrTiff
           side-effect for the page.evaluate classic-script context). Single
           source of truth so the in-browser viewer and server-side thumbnail
           render interpret the same TIFF identically.
         All deferred so they execute before the main module script in document order. -->
    <script defer src="./node_modules/pako/dist/pako.min.js"></script>
    <script defer src="./node_modules/utif2/UTIF.js"></script>
    <!-- The import map MUST come before any module script. Newer Chrome (e.g.
         bundled in the native installer) strictly ignores an import map added
         after a module load has been triggered, breaking `import ... 'three'`. -->
    <script type="importmap">
      {
        "imports": {
          "three": "./node_modules/three/build/three.module.js",
          "three/addons/": "./node_modules/three/examples/jsm/"
        }
      }
    </script>
    <script type="module" src="./lib/tiffDecode.js"></script>
    <script type="module">
      import * as THREE from 'three'
      import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js'
      import { OBJLoader } from 'three/addons/loaders/OBJLoader.js'
      import { FBXLoader } from 'three/addons/loaders/FBXLoader.js'
      import { STLLoader } from 'three/addons/loaders/STLLoader.js'
      import { ThreeMFLoader } from 'three/addons/loaders/3MFLoader.js'
      import { EXRLoader } from 'three/addons/loaders/EXRLoader.js'
      import { RGBELoader } from 'three/addons/loaders/RGBELoader.js'
      import * as BufferGeometryUtils from 'three/addons/utils/BufferGeometryUtils.js'
      import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js'
      import { buildStlModel } from './lib/stlMesh.js'
      import {
        DEFAULT_LIGHTING,
        ENVIRONMENT_PREVIEW_LIGHTING,
        buildSceneLights,
      } from './lib/sceneLighting.js'
      // Loaded for their window side-effects: the applyTextures page.evaluate
      // (puppeteerRenderer.js) runs as a classic script and can't import, so it
      // reaches these shared rules through window globals
      // (window.modelibrTextureMaterial / window.modelibrDispNormal). Single
      // source of truth with the viewer.
      import './lib/textureMaterial.js'
      import './lib/displacementNormal.js'

      // Global state for external control
      window.modelRenderer = {
        scene: null,
        camera: null,
        renderer: null,
        model: null,
        modelContainer: null, // Container for model rotation
        environmentRoot: null,
        disposableTextures: [],
        disposableMaterials: [],
        disposableGeometries: [],
        defaultEnvironment: null,
        defaultEnvironmentIntensity: DEFAULT_LIGHTING.environmentIntensity,
        lights: null,
        orbitMode: 'model',
        isReady: false,
        error: null,
        useWebGPU: false,
      }

      // Initialize scene with WebGPU or WebGL
      async function initScene(width, height, backgroundColor) {
        const container = document.getElementById('canvas-container')

        // Create scene
        const scene = new THREE.Scene()
        // Set background to null for transparency
        scene.background = null

        // Create camera with tighter field of view for better framing
        const camera = new THREE.PerspectiveCamera(
          45, // field of view - reduced from 60 to 45 for tighter framing
          width / height, // aspect ratio
          0.1, // near plane
          1000 // far plane
        )

        // Create renderer with WebGPU or WebGL
        let renderer
        try {
          // Try WebGPU first if available
          if (navigator.gpu) {
            try {
              console.log('WebGPU available, attempting to use WebGPU renderer')

              // Import WebGPU renderer dynamically
              const { WebGPURenderer } = await import(
                'three/addons/renderers/webgpu/WebGPURenderer.js'
              )

              renderer = new WebGPURenderer({
                antialias: true,
                alpha: true,
              })

              await renderer.init()
              window.modelRenderer.useWebGPU = true
              console.log('WebGPU renderer initialized successfully')
            } catch (webgpuError) {
              console.warn(
                'WebGPU initialization failed, falling back to WebGL:',
                webgpuError
              )
              renderer = null
            }
          }

          // Fallback to WebGL if WebGPU not available or failed
          if (!renderer) {
            console.log('Using WebGL renderer')
            renderer = new THREE.WebGLRenderer({
              antialias: true,
              alpha: true,
              preserveDrawingBuffer: false,
            })
            window.modelRenderer.useWebGPU = false
          }
        } catch (error) {
          console.error('Failed to create renderer:', error)
          window.modelRenderer.error = error.message
          return false
        }

        renderer.setSize(width, height)
        // Set clear color with alpha 0 for transparency
        renderer.setClearColor(0x000000, 0)
        // Keep autoClear enabled and let Three.js handle it properly
        renderer.autoClear = true

        // Shadow mapping (WebGL specific)
        if (!window.modelRenderer.useWebGPU && renderer.shadowMap) {
          renderer.shadowMap.enabled = true
          renderer.shadowMap.type = THREE.PCFSoftShadowMap
        }

        container.appendChild(renderer.domElement)

        // Setup lighting from the shared cross-runtime rig (lib/sceneLighting.js)
        // so the thumbnail and the in-app viewer light models identically.
        // Balanced to avoid overexposure on PBR materials.
        const lights = buildSceneLights(THREE, DEFAULT_LIGHTING)
        scene.add(...lights.lights)

        // IBL via PMREMGenerator + neutral studio environment
        // environmentIntensity is kept low (DEFAULT_LIGHTING) so PBR model
        // thumbnails are not overexposed; direct lights carry the primary
        // illumination.
        const pmremGenerator = new THREE.PMREMGenerator(renderer)
        pmremGenerator.compileEquirectangularShader()
        const roomEnv = new RoomEnvironment(renderer)
        const envMap = pmremGenerator.fromScene(roomEnv).texture
        scene.environment = envMap
        scene.environmentIntensity = DEFAULT_LIGHTING.environmentIntensity
        roomEnv.dispose()

        window.modelRenderer.scene = scene
        window.modelRenderer.camera = camera
        window.modelRenderer.renderer = renderer
        window.modelRenderer.pmremGenerator = pmremGenerator
        window.modelRenderer.defaultEnvironment = envMap
        window.modelRenderer.defaultEnvironmentIntensity =
          DEFAULT_LIGHTING.environmentIntensity
        window.modelRenderer.lights = {
          ambient: lights.ambient,
          directional: lights.directional,
          point: lights.point,
          spot: lights.spot,
        }

        return true
      }

      function registerDisposableTexture(texture) {
        if (texture) {
          window.modelRenderer.disposableTextures.push(texture)
        }
      }

      function registerDisposableMaterial(material) {
        if (material) {
          window.modelRenderer.disposableMaterials.push(material)
        }
      }

      function registerDisposableGeometry(geometry) {
        if (geometry) {
          window.modelRenderer.disposableGeometries.push(geometry)
        }
      }

      function disposeRegisteredResources() {
        for (const texture of window.modelRenderer.disposableTextures) {
          try {
            texture.dispose?.()
          } catch (e) {
            console.warn('Failed to dispose texture:', e)
          }
        }

        for (const material of window.modelRenderer.disposableMaterials) {
          try {
            if (Array.isArray(material)) {
              material.forEach(entry => entry?.dispose?.())
            } else {
              material.dispose?.()
            }
          } catch (e) {
            console.warn('Failed to dispose material:', e)
          }
        }

        for (const geometry of window.modelRenderer.disposableGeometries) {
          try {
            geometry.dispose?.()
          } catch (e) {
            console.warn('Failed to dispose geometry:', e)
          }
        }

        window.modelRenderer.disposableTextures = []
        window.modelRenderer.disposableMaterials = []
        window.modelRenderer.disposableGeometries = []
      }

      function applyDefaultSceneEnvironment() {
        const scene = window.modelRenderer.scene
        if (!scene) return

        scene.background = null
        scene.backgroundBlurriness = 0
        scene.environment = window.modelRenderer.defaultEnvironment
        scene.environmentIntensity =
          window.modelRenderer.defaultEnvironmentIntensity
        window.modelRenderer.orbitMode = 'model'

        const lights = window.modelRenderer.lights
        if (lights) {
          lights.ambient.intensity = DEFAULT_LIGHTING.ambient.intensity
          lights.directional.intensity = DEFAULT_LIGHTING.directional.intensity
          lights.point.intensity = DEFAULT_LIGHTING.point.intensity
          lights.spot.intensity = DEFAULT_LIGHTING.spot.intensity
        }
      }

      function applyEnvironmentSceneLighting() {
        const lights = window.modelRenderer.lights
        if (!lights) return

        lights.ambient.intensity = ENVIRONMENT_PREVIEW_LIGHTING.ambient
        lights.directional.intensity = ENVIRONMENT_PREVIEW_LIGHTING.directional
        lights.point.intensity = ENVIRONMENT_PREVIEW_LIGHTING.point
        lights.spot.intensity = ENVIRONMENT_PREVIEW_LIGHTING.spot
      }

      function createEnvironmentSphere(options = {}) {
        const THREE = window.THREE
        const group = new THREE.Group()

        const sphereGeometry = new THREE.SphereGeometry(
          1.15,
          options.sphereSegments || 96,
          Math.max(24, Math.floor((options.sphereSegments || 96) / 2))
        )
        const sphereMaterial = new THREE.MeshStandardMaterial({
          color: 0xffffff,
          metalness: options.sphereMetalness ?? 1,
          roughness: options.sphereRoughness ?? 0.08,
          envMapIntensity: options.environmentIntensity ?? 1.2,
        })
        const sphere = new THREE.Mesh(sphereGeometry, sphereMaterial)
        sphere.castShadow = true
        sphere.receiveShadow = true
        group.add(sphere)

        registerDisposableGeometry(sphereGeometry)
        registerDisposableMaterial(sphereMaterial)

        return group
      }

      function buildPanoramicBackground(texture) {
        const THREE = window.THREE
        const geometry = new THREE.SphereGeometry(40, 64, 48)
        const material = new THREE.MeshBasicMaterial({
          map: texture,
          side: THREE.BackSide,
        })
        const mesh = new THREE.Mesh(geometry, material)
        registerDisposableGeometry(geometry)
        registerDisposableMaterial(material)
        return mesh
      }

      function buildCubeBackground(faceTextures) {
        const THREE = window.THREE
        const geometry = new THREE.BoxGeometry(60, 60, 60)
        const materialOrder = ['px', 'nx', 'py', 'ny', 'pz', 'nz']
        const materials = materialOrder.map(faceKey => {
          const material = new THREE.MeshBasicMaterial({
            map: faceTextures[faceKey],
            side: THREE.BackSide,
          })
          registerDisposableMaterial(material)
          return material
        })

        const mesh = new THREE.Mesh(geometry, materials)
        registerDisposableGeometry(geometry)
        return mesh
      }

      async function loadTextureDescriptor(descriptor, useSrgb = true) {
        const THREE = window.THREE
        if (!descriptor?.url) {
          throw new Error('Texture descriptor url is required')
        }

        const ext = descriptor.extension?.toLowerCase() || ''

        if (ext === '.exr') {
          const loader = new window.EXRLoader()
          const texture = await loader.loadAsync(descriptor.url)
          texture.colorSpace = THREE.LinearSRGBColorSpace
          texture.needsUpdate = true
          registerDisposableTexture(texture)
          return texture
        }

        if (ext === '.hdr') {
          const loader = new window.RGBELoader()
          const texture = await loader.loadAsync(descriptor.url)
          texture.colorSpace = THREE.LinearSRGBColorSpace
          texture.needsUpdate = true
          registerDisposableTexture(texture)
          return texture
        }

        const loader = new THREE.TextureLoader()
        const texture = await loader.loadAsync(descriptor.url)
        texture.colorSpace = useSrgb
          ? THREE.SRGBColorSpace
          : THREE.LinearSRGBColorSpace
        texture.needsUpdate = true
        registerDisposableTexture(texture)
        return texture
      }

      async function buildCubePmrem(faceTextures) {
        const pmremScene = new THREE.Scene()
        pmremScene.add(buildCubeBackground(faceTextures))
        const envRenderTarget = window.modelRenderer.pmremGenerator.fromScene(
          pmremScene,
          0,
          0.1,
          80
        )
        registerDisposableTexture(envRenderTarget)
        return envRenderTarget.texture
      }

      async function loadEnvironmentPreview(source, options = {}) {
        if (
          !window.modelRenderer.scene ||
          !window.modelRenderer.pmremGenerator
        ) {
          throw new Error('Renderer scene is not initialized')
        }

        clearScene()
        applyEnvironmentSceneLighting()

        const scene = window.modelRenderer.scene
        const root = new window.THREE.Group()
        let environmentTexture = null

        if (source.projectionType === 'cube') {
          const cubeTextures = {}
          for (const face of ['px', 'nx', 'py', 'ny', 'pz', 'nz']) {
            cubeTextures[face] = await loadTextureDescriptor(
              source.cubeFaces?.[face],
              true
            )
          }

          root.add(buildCubeBackground(cubeTextures))
          environmentTexture = await buildCubePmrem(cubeTextures)
          scene.background = null
        } else {
          const panoramicTexture = await loadTextureDescriptor(source.panoramic)
          panoramicTexture.mapping =
            window.THREE.EquirectangularReflectionMapping
          const envRenderTarget =
            window.modelRenderer.pmremGenerator.fromEquirectangular(
              panoramicTexture
            )
          environmentTexture = envRenderTarget.texture
          registerDisposableTexture(envRenderTarget)
          root.add(buildPanoramicBackground(panoramicTexture))
          scene.background = null
          scene.backgroundBlurriness = 0
        }

        scene.environment = environmentTexture
        scene.environmentIntensity = options.environmentIntensity ?? 1.2

        const previewSphere = createEnvironmentSphere(options)
        const normInfo = window.normalizeModel(previewSphere, 2.6)
        window.modelRenderer.model = previewSphere
        window.modelRenderer.environmentRoot = root
        window.modelRenderer.scene.add(root)
        window.modelRenderer.scene.add(window.modelRenderer.modelContainer)
        window.modelRenderer.orbitMode = 'camera'
        window.modelRenderer.isReady = true

        return {
          success: true,
          polygonCount: window.countPolygons(previewSphere),
          boundingSphereRadius: normInfo.boundingSphereRadius,
        }
      }

      // Load model from data URL or URL.
      // preserveMaterials=true (the "Embedded" variant) keeps the model's own
      // materials and vertex colors instead of the neutral override — lets
      // users choose between the real surface and a clean default thumbnail.
      async function loadModel(modelData, fileType, preserveMaterials = false) {
        return new Promise((resolve, reject) => {
          let loader

          if (fileType === 'gltf' || fileType === 'glb') {
            loader = new GLTFLoader()
          } else if (fileType === 'obj') {
            loader = new OBJLoader()
          } else if (fileType === 'fbx') {
            loader = new FBXLoader()
          } else if (fileType === 'stl') {
            loader = new STLLoader()
          } else if (fileType === '3mf') {
            loader = new ThreeMFLoader()
          } else {
            reject(new Error(`Unsupported file type: ${fileType}`))
            return
          }

          loader.load(
            modelData,
            result => {
              let model
              if (fileType === 'gltf' || fileType === 'glb') {
                model = result.scene
                // GLTFLoader keeps clips on the result, not the scene —
                // carry them over so metadata extraction can see them.
                model.animations = result.animations || []
              } else if (fileType === 'stl') {
                // STLLoader resolves to a raw BufferGeometry — wrap it (and
                // surface any binary-STL vertex colors) via the shared builder
                // so the viewer and this thumbnail render shade STL identically.
                // In the default (override) path the material is replaced below.
                model = buildStlModel(THREE, result)
              } else {
                model = result
              }

              // glTF/GLB carry embedded PBR materials (BaseColor, MR, normal,
              // emissive, …) that map 1:1 from Blender's Principled BSDF —
              // preserve them so embedded-material thumbnails show the real
              // material instead of a flat gray placeholder. If a texture set
              // is configured for this model, applyTextures() replaces these
              // materials wholesale, so preservation is safe.
              //
              // OBJ/FBX embedded materials are inconsistent across DCC tools,
              // so keep the neutral-PBR baseline override for those — unless the
              // user explicitly picked the "Embedded" variant (preserveMaterials),
              // which forces the original materials/vertex colors for any format.
              const preserveEmbeddedMaterials =
                preserveMaterials || fileType === 'gltf' || fileType === 'glb'

              model.traverse(child => {
                if (child.isMesh) {
                  if (!preserveEmbeddedMaterials) {
                    const originalName = Array.isArray(child.material)
                      ? child.material[0]?.name || ''
                      : child.material?.name || ''
                    child.material = new THREE.MeshStandardMaterial({
                      name: originalName,
                      color: new THREE.Color(0.7, 0.7, 0.9),
                      metalness: 0.3,
                      roughness: 0.4,
                      envMapIntensity: 1.0,
                    })
                  }
                  child.castShadow = true
                  child.receiveShadow = true
                }
              })

              resolve(model)
            },
            undefined,
            error => {
              reject(error)
            }
          )
        })
      }

      // Normalize model to center and fit in view, centered around bounding box
      function normalizeModel(model, scale = 2.0) {
        // Calculate bounding box of the original model
        const box = new THREE.Box3().setFromObject(model)
        const center = box.getCenter(new THREE.Vector3())
        const size = box.getSize(new THREE.Vector3())

        // Scale to fit
        const maxDimension = Math.max(size.x, size.y, size.z)
        if (maxDimension > 0) {
          const scaleFactor = scale / maxDimension
          // Multiply, don't replace: FBX (and some glTF) loaders bake a
          // non-1 unit-conversion scale into the root. setScalar would drop
          // it and shrink the model to ~1/100 of intended size.
          model.scale.multiplyScalar(scaleFactor)
        }

        // Recalculate bounding box after scaling
        const scaledBox = new THREE.Box3().setFromObject(model)
        const scaledCenter = scaledBox.getCenter(new THREE.Vector3())
        const scaledSize = scaledBox.getSize(new THREE.Vector3())

        // Center the model around its bounding box center.
        // Subtract (not assign): FBX bakes a non-zero translation into the
        // root, and overwriting it would offset the model from the camera.
        model.position.x -= scaledCenter.x
        model.position.y -= scaledCenter.y
        model.position.z -= scaledCenter.z

        // Create a container group for rotation around the true center
        const container = new THREE.Group()
        container.position.set(0, 0, 0)

        // Add model to container
        container.add(model)

        // Store reference to container for rotation
        window.modelRenderer.modelContainer = container

        // Calculate the diagonal radius of the bounding box
        // This ensures the entire model is visible when rotated in any direction
        const diagonalRadius =
          Math.sqrt(
            scaledSize.x * scaledSize.x +
              scaledSize.y * scaledSize.y +
              scaledSize.z * scaledSize.z
          ) / 2

        return {
          center,
          size,
          maxDimension,
          boundingSphereRadius: diagonalRadius,
        }
      }

      // Position camera for rendering (now rotates model instead of camera)
      function positionCamera(azimuthAngle, distance, elevationAngle = 0) {
        const azimuthRad = (azimuthAngle * Math.PI) / 180
        const elevationRad = (elevationAngle * Math.PI) / 180

        if (window.modelRenderer.orbitMode === 'camera') {
          const horizontalDistance = distance * Math.cos(elevationRad)
          const cameraY = distance * Math.sin(elevationRad)
          const cameraX = horizontalDistance * Math.sin(azimuthRad)
          const cameraZ = horizontalDistance * Math.cos(azimuthRad)

          window.modelRenderer.camera.position.set(cameraX, cameraY, cameraZ)
          window.modelRenderer.camera.lookAt(0, 0, 0)

          if (window.modelRenderer.modelContainer) {
            window.modelRenderer.modelContainer.rotation.set(0, 0, 0)
          }

          return
        }

        window.modelRenderer.camera.position.set(0, 0, distance)
        window.modelRenderer.camera.lookAt(0, 0, 0)

        if (window.modelRenderer.modelContainer) {
          window.modelRenderer.modelContainer.rotation.set(0, 0, 0)
          window.modelRenderer.modelContainer.rotation.y = azimuthRad
          window.modelRenderer.modelContainer.rotation.x = -elevationRad
        }
      }

      // Render the scene
      async function renderScene() {
        if (
          !window.modelRenderer.renderer ||
          !window.modelRenderer.scene ||
          !window.modelRenderer.camera
        ) {
          return false
        }

        // WebGPU renderer uses async render
        if (window.modelRenderer.useWebGPU) {
          await window.modelRenderer.renderer.render(
            window.modelRenderer.scene,
            window.modelRenderer.camera
          )
        } else {
          window.modelRenderer.renderer.render(
            window.modelRenderer.scene,
            window.modelRenderer.camera
          )
        }
        return true
      }

      // Get canvas as data URL
      function getCanvasDataURL() {
        if (!window.modelRenderer.renderer) {
          return null
        }
        return window.modelRenderer.renderer.domElement.toDataURL('image/png')
      }

      // Count polygons in model
      function countPolygons(model) {
        let count = 0
        model.traverse(child => {
          if (child.isMesh && child.geometry) {
            if (child.geometry.index !== null) {
              count += child.geometry.index.count / 3
            } else if (child.geometry.attributes.position) {
              count += child.geometry.attributes.position.count / 3
            }
          }
        })
        return Math.floor(count)
      }

      // Clear the scene by removing the previous model
      function clearScene() {
        disposeRegisteredResources()

        if (window.modelRenderer.modelContainer && window.modelRenderer.scene) {
          try {
            // Remove the container (which includes the model) from the scene
            window.modelRenderer.scene.remove(
              window.modelRenderer.modelContainer
            )

            // Dispose of geometries and materials to free memory
            if (window.modelRenderer.model) {
              window.modelRenderer.model.traverse(child => {
                if (child.isMesh) {
                  try {
                    if (child.geometry) {
                      child.geometry.dispose()
                    }
                  } catch (e) {
                    console.warn('Failed to dispose geometry:', e)
                  }

                  try {
                    if (child.material) {
                      if (Array.isArray(child.material)) {
                        child.material.forEach(material => {
                          try {
                            material.dispose()
                          } catch (e) {
                            console.warn('Failed to dispose material:', e)
                          }
                        })
                      } else {
                        child.material.dispose()
                      }
                    }
                  } catch (e) {
                    console.warn('Failed to dispose material:', e)
                  }
                }
              })
            }

            // Clear the references
            window.modelRenderer.model = null
            window.modelRenderer.modelContainer = null
          } catch (error) {
            console.error('Error clearing scene:', error)
          }
        }

        if (
          window.modelRenderer.environmentRoot &&
          window.modelRenderer.scene
        ) {
          try {
            window.modelRenderer.scene.remove(
              window.modelRenderer.environmentRoot
            )
          } catch (error) {
            console.warn('Failed to remove environment root:', error)
          }
        }

        window.modelRenderer.environmentRoot = null
        window.modelRenderer.model = null
        window.modelRenderer.modelContainer = null
        window.modelRenderer.isReady = false
        applyDefaultSceneEnvironment()

        console.log('Scene cleared successfully')
        return true
      }

      // Expose THREE and API for Puppeteer
      window.THREE = THREE
      window.initRenderer = initScene
      window.loadModelFromData = loadModel
      window.normalizeModel = normalizeModel
      window.positionCamera = positionCamera
      window.renderScene = renderScene
      window.getCanvasDataURL = getCanvasDataURL
      window.countPolygons = countPolygons
      window.clearScene = clearScene
      window.applyDefaultSceneEnvironment = applyDefaultSceneEnvironment
      window.loadEnvironmentPreviewFromSource = loadEnvironmentPreview
      window.EXRLoader = EXRLoader
      window.RGBELoader = RGBELoader
      window.BufferGeometryUtils = BufferGeometryUtils

      console.log('3D Renderer initialized and ready')
    </script>
  </body>
</html>
